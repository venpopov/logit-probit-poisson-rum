project:
  type: manuscript
  render:
    - "!AGENTS.md"
    - "!meta/"
    - "**/*.qmd"

manuscript:
  article: index.qmd
  code-links:
    - text: Simulation functions
      icon: file-code
      href: R/race_functions.R
    - repo

bibliography: references.bib
csl: apa.csl

format:
  html: default
  apaquarto-pdf:
    documentmode: man
    notebook-links: false

execute:
  freeze: auto
  execute-dir: project



